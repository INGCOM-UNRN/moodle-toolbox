[project]
name = "gift-tools"
version = "0.1.0"
description = "Herramientas para parsear y verificar archivos GIFT de Moodle"
readme = "README_gift_parser.md"
requires-python = ">=3.11"
dependencies = [
    "tatsu>=5.15.1",
    "google-generativeai",
    "python-dotenv",
]

[project.scripts]
gift-parse = "gift_tools.gift_parser:main"
gift-verify = "gift_tools.verify_gift_directory:main"
gift-gemini = "gift_tools.gemini_gift_processor:main"

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gift_tools"]
